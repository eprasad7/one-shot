$kind: http-request
name: Create Training Job
method: POST
url: '{{base_url}}/api/v1/training/jobs'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "agent_name": "{{agent_name}}",
      "algorithm": "apo",
      "max_iterations": 10,
      "auto_activate": false,
      "eval_tasks": [
        {
          "name": "basic-greeting",
          "input": "Hello, how are you?",
          "expected": "hello",
          "grader": "contains"
        },
        {
          "name": "factual-question",
          "input": "What is the capital of France?",
          "expected": "Paris",
          "grader": "contains"
        }
      ],
      "config": {
        "gradient_model": "@cf/meta/llama-3.1-70b-instruct",
        "edit_model": "@cf/meta/llama-3.1-70b-instruct"
      },
      "tags": ["experiment-1"]
    }
tests:
  - type: js
    content: |-
      const body = pm.response.json();
      if (body.job_id) {
        pm.collectionVariables.set("training_job_id", body.job_id);
      }
